<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#d4a24c" flood-opacity="0.5"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0a0807"/>

  <!-- Subtle radial glow -->
  <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#d4a24c" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#0a0807" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" fill="url(#bgGlow)"/>

  <!-- Border frame -->
  <rect x="28" y="28" width="456" height="456" fill="none" stroke="#d4a24c" stroke-width="3" opacity="0.35"/>

  <!-- Corner ornaments -->
  <rect x="24" y="24" width="20" height="20" fill="#d4a24c"/>
  <rect x="468" y="24" width="20" height="20" fill="#d4a24c"/>
  <rect x="24" y="468" width="20" height="20" fill="#d4a24c"/>
  <rect x="468" y="468" width="20" height="20" fill="#d4a24c"/>

  <!-- Swords group: scale the 100x100 viewBox swords to fill the icon -->
  <!-- Original viewBox 0 0 100 100, scaled 4.2x and centered at 256,256 -->
  <g transform="translate(256,256) scale(4.2) translate(-50,-50)" filter="url(#shadow)">
    <!-- Sword 1: rotated -32 deg -->
    <g transform="rotate(-32 50 50)">
      <polygon points="48,10 52,10 52,54 48,54" fill="#d4a24c"/>
      <polygon points="48,10 52,10 50,3" fill="#d4a24c"/>
      <polygon points="48,10 50,3 49,10" fill="#f0c060"/>
      <rect x="48" y="11" width="1" height="42" fill="#f0c060" opacity="0.7"/>
      <rect x="49.5" y="13" width="1" height="38" fill="#06030200" opacity="0.45"/>
      <rect x="51" y="11" width="1" height="42" fill="#06030200" opacity="0.3"/>
      <polygon points="33,55 67,55 64,61 36,61" fill="#d4a24c"/>
      <polygon points="33,55 67,55 65,57 35,57" fill="#f0c060"/>
      <polygon points="33,55 30,57 33,61" fill="#d4a24c"/>
      <polygon points="67,55 70,57 67,61" fill="#d4a24c"/>
      <rect x="46" y="61" width="8" height="18" fill="#d4a24c"/>
      <rect x="46" y="61" width="2" height="18" fill="#f0c060"/>
      <rect x="46" y="64" width="8" height="1.5" fill="#000" opacity="0.45"/>
      <rect x="46" y="68" width="8" height="1.5" fill="#000" opacity="0.45"/>
      <rect x="46" y="72" width="8" height="1.5" fill="#000" opacity="0.45"/>
      <rect x="46" y="76" width="8" height="1.5" fill="#000" opacity="0.45"/>
      <polygon points="50,79 56,85 50,91 44,85" fill="#d4a24c"/>
      <polygon points="50,81 54,85 50,89 46,85" fill="#f0c060"/>
    </g>
    <!-- Sword 2: rotated +32 deg -->
    <g transform="rotate(32 50 50)">
      <polygon points="48,10 52,10 52,54 48,54" fill="#d4a24c"/>
      <polygon points="48,10 52,10 50,3" fill="#d4a24c"/>
      <polygon points="48,10 50,3 49,10" fill="#f0c060"/>
      <rect x="48" y="11" width="1" height="42" fill="#f0c060" opacity="0.7"/>
      <rect x="49.5" y="13" width="1" height="38" fill="#06030200" opacity="0.45"/>
      <rect x="51" y="11" width="1" height="42" fill="#06030200" opacity="0.3"/>
      <polygon points="33,55 67,55 64,61 36,61" fill="#d4a24c"/>
      <polygon points="33,55 67,55 65,57 35,57" fill="#f0c060"/>
      <polygon points="33,55 30,57 33,61" fill="#d4a24c"/>
      <polygon points="67,55 70,57 67,61" fill="#d4a24c"/>
      <rect x="46" y="61" width="8" height="18" fill="#d4a24c"/>
      <rect x="46" y="61" width="2" height="18" fill="#f0c060"/>
      <rect x="46" y="64" width="8" height="1.5" fill="#000" opacity="0.45"/>
      <rect x="46" y="68" width="8" height="1.5" fill="#000" opacity="0.45"/>
      <rect x="46" y="72" width="8" height="1.5" fill="#000" opacity="0.45"/>
      <rect x="46" y="76" width="8" height="1.5" fill="#000" opacity="0.45"/>
      <polygon points="50,79 56,85 50,91 44,85" fill="#d4a24c"/>
      <polygon points="50,81 54,85 50,89 46,85" fill="#f0c060"/>
    </g>
    <!-- Center rivet -->
    <rect x="47" y="47" width="6" height="6" fill="#f0c060" transform="rotate(45 50 50)"/>
    <rect x="48.5" y="48.5" width="3" height="3" fill="#0a0807" transform="rotate(45 50 50)"/>
  </g>

  <!-- "NT" wordmark at bottom -->
  <text x="256" y="460" font-family="monospace" font-size="36" font-weight="bold"
        fill="#d4a24c" text-anchor="middle" letter-spacing="12" opacity="0.7">NT</text>
</svg>
